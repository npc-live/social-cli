platform: xiaohongshu
login_url: https://www.xiaohongshu.com
login_check:
  cookie: web_session

commands:

  search:
    args: [keyword]
    steps:
      - open: "https://www.xiaohongshu.com/search_result?keyword={{keyword}}&source=web_explore_feed"
      - wait: 4000
      - extract:
          selector: .note-item
          fields:
            title:  ".title, [class*=title]"
            author: ".author .name, .nickname"
            link:
              selector: a
              attr: href

  hot:
    args: []
    steps:
      - open: "https://www.xiaohongshu.com/explore"
      - wait: 4000
      - extract:
          selector: .note-item
          fields:
            title:  ".title, [class*=title]"
            author: ".author .name, .nickname"
            link:
              selector: a
              attr: href

  like:
    args: [url]
    steps:
      - open: "{{url}}"
      - wait: 3000
      - capture:
          name: was_liked
          eval: "document.querySelector('.like-wrapper') ? document.querySelector('.like-wrapper').classList.contains('like-active') : false"
      - click:
          selector: ".like-wrapper"
      - wait: 500
      - capture:
          name: is_liked
          eval: "document.querySelector('.like-wrapper') ? document.querySelector('.like-wrapper').classList.contains('like-active') : false"
      - capture:
          name: count
          eval: "document.querySelector('.like-wrapper .count') ? document.querySelector('.like-wrapper .count').textContent.trim() : '?'"
      - return:
          - field: 操作
            value: "{{was_liked == 'true' && '取消点赞' || '点赞成功'}}"
          - field: 状态
            value: "{{is_liked}}"
          - field: 点赞数
            value: "{{count}}"

  comment:
    args: [url, text]
    steps:
      - open: "{{url}}"
      - wait: 3000
      - click:
          text: "说点什么..."
      - wait: 800
      - type_rich:
          selector: ".content-input"
          value: "{{text}}"
      - wait: 500
      - capture:
          name: input_text
          eval: "document.querySelector('.content-input') ? document.querySelector('.content-input').textContent.trim() : ''"
      - click:
          text: "发送"
      - wait: 1500
      - return:
          - field: 状态
            value: "✅ 评论成功"
          - field: 评论内容
            value: "{{text}}"
          - field: 输入确认
            value: "{{input_text}}"

  post:
    args: [title, content]
    steps:
      - open: "https://creator.xiaohongshu.com/publish/publish?source=official"
      - wait: 3000
      - click:
          text: "上传图文"
      - wait: 1500
      - fill:
          selector: "input.d-text[placeholder*='标题']"
          value: "{{title}}"
      - wait: 500
      - type_rich:
          selector: ".tiptap.ProseMirror"
          value: "{{content}}"
      - wait: 500
      - capture:
          name: current_url
          eval: "location.href"
      - click:
          text: "发布"
      - wait: 2000
      - capture:
          name: result_url
          eval: "location.href"
      - return:
          - field: 状态
            value: "✅ 发布成功"
          - field: 标题
            value: "{{title}}"
          - field: 正文
            value: "{{content}}"
          - field: 跳转URL
            value: "{{result_url}}"
