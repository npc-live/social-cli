platform: xiaohongshu
login_url: https://www.xiaohongshu.com
login_check:
  cookie: web_session

commands:

  search:
    args: [keyword]
    steps:
      - open: "https://www.xiaohongshu.com/search_result?keyword={{keyword}}&source=web_explore_feed"
      - wait: 4000
      - extract:
          selector: .note-item
          fields:
            title:  ".title, [class*=title]"
            author: ".author .name, .nickname"
            link:
              selector: a
              attr: href

  hot:
    args: []
    steps:
      - open: "https://www.xiaohongshu.com/explore"
      - wait: 4000
      - extract:
          selector: .note-item
          fields:
            title:  ".title, [class*=title]"
            author: ".author .name, .nickname"
            link:
              selector: a
              attr: href

  like:
    args: [url]
    steps:
      - open: "{{url}}"
      - wait: 3000
      - capture:
          name: was_liked
          eval: "document.querySelector('.like-wrapper') ? document.querySelector('.like-wrapper').classList.contains('like-active') : false"
      - click:
          selector: ".like-wrapper"
      - wait: 500
      - capture:
          name: is_liked
          eval: "document.querySelector('.like-wrapper') ? document.querySelector('.like-wrapper').classList.contains('like-active') : false"
      - capture:
          name: count
          eval: "document.querySelector('.like-wrapper .count') ? document.querySelector('.like-wrapper .count').textContent.trim() : '?'"
      - return:
          - field: 操作
            value: "{{was_liked == 'true' && '取消点赞' || '点赞成功'}}"
          - field: 状态
            value: "{{is_liked}}"
          - field: 点赞数
            value: "{{count}}"

  comment:
    args: [url, text]
    steps:
      - open: "{{url}}"
      - wait: 3000
      - click:
          text: "说点什么..."
      - wait: 800
      - type_rich:
          selector: ".content-input"
          value: "{{text}}"
      - wait: 500
      - capture:
          name: input_text
          eval: "document.querySelector('.content-input') ? document.querySelector('.content-input').textContent.trim() : ''"
      - click:
          text: "发送"
      - wait: 1500
      - return:
          - field: 状态
            value: "✅ 评论成功"
          - field: 评论内容
            value: "{{text}}"
          - field: 输入确认
            value: "{{input_text}}"

  post_video:
    args: [video, title, desc]   # video: 本地视频路径（必填）
    steps:
      - open: "https://creator.xiaohongshu.com/publish/publish?source=official"
      - wait: 3000
      # 默认就在「上传视频」tab，直接上传
      - upload:
          selector: "input.upload-input"
          file: "{{video}}"
      # 等待上传完成（标题输入框出现）
      - wait:
          selector: "input.d-text"
      - wait: 1000
      # 填写标题
      - fill:
          selector: "input.d-text"
          value: "{{title}}"
      - wait: 500
      # 填写描述（ProseMirror 富文本）
      - type_rich:
          selector: ".tiptap.ProseMirror"
          value: "{{desc}}"
      - wait: 800
      # 点击发布
      - eval: >-
          (function(){
            var btns = Array.from(document.querySelectorAll("button"));
            var btn = btns.filter(function(b){ return b.textContent.trim() === "发布"; }).pop();
            if(btn && !btn.disabled) { btn.click(); return true; }
            return false;
          })()
      - wait: 3000
      - capture:
          name: result_url
          eval: "location.href"
      - return:
          - field: 状态
            value: "✅ 发布成功"
          - field: 标题
            value: "{{title}}"
          - field: 描述
            value: "{{desc}}"
          - field: 跳转URL
            value: "{{result_url}}"

  post:
    args: [title, content, image]   # image: 本地图片路径（必填，小红书图文必须有图）
    steps:
      - open: "https://creator.xiaohongshu.com/publish/publish?source=official"
      - wait: 3000
      # 切到图文 tab
      - click:
          text: "上传图文"
      - wait: 1500
      # 上传图片
      - upload:
          selector: "input[type=file][accept*=jpg]"
          file: "{{image}}"
      # 等待图片上传 + 编辑器渲染
      - wait:
          selector: "input.d-text"
      # 填标题
      - fill:
          selector: "input.d-text"
          value: "{{title}}"
      - wait: 500
      # 填正文
      - type_rich:
          selector: ".tiptap.ProseMirror"
          value: "{{content}}"
      - wait: 800
      # 点发布（selector 更稳定，避免 text 匹配问题）
      - eval: >-
          (function(){
            var btns = [...document.querySelectorAll('button')];
            var btn = btns.reverse().find(function(b){ return b.textContent.trim() === '发布'; });
            if (btn && !btn.disabled) { btn.click(); return true; }
            return false;
          })()
      - wait: 2500
      - capture:
          name: result_url
          eval: "location.href"
      - return:
          - field: 状态
            value: "✅ 发布成功"
          - field: 标题
            value: "{{title}}"
          - field: 正文
            value: "{{content}}"
          - field: 跳转URL
            value: "{{result_url}}"
